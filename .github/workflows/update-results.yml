name: Update results

# Runs the fetch script, then commits results.js if anything changed.
# Three triggers: a daily schedule, a manual button, and on-push (to test).
on:
  schedule:
    # 09:00 UTC = 12:00 (midday) in the Gulf (UTC+3). Change this one line to
    # retime it — it's standard cron in UTC. e.g. "0 12 * * *" = midday UTC.
    - cron: "0 9 * * *"
  workflow_dispatch: {}   # adds a "Run workflow" button in the repo's Actions tab

# let the job push the regenerated results.js back to the repo
permissions:
  contents: write

# don't pile up overlapping runs
concurrency:
  group: update-results
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch latest results
        run: node scripts/update-results.js

      - name: Commit if changed
        run: |
          git config user.name "wc-results-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results.js
          if git diff --staged --quiet; then
            echo "No changes — nothing to commit."
          else
            git commit -m "Auto-update results"
            git push
          fi
