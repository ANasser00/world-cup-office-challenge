name: Update results

# Auto-refreshes results.js from football-data.org.
on:
  schedule:
    - cron: "17 */12 * * *"   # every 12h (00:17 & 12:17 UTC)
  workflow_dispatch: {}        # manual "Run workflow" button

permissions:
  contents: write

concurrency:
  group: update-results
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch latest data
        env:
          FD_TOKEN: ${{ secrets.FD_TOKEN }}
        run: node scripts/update-from-api.js

      - name: Commit if changed
        run: |
          git config user.name "wc-results-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results.js
          if git diff --staged --quiet; then
            echo "No changes."
          else
            git commit -m "Auto-update results ($(date -u '+%Y-%m-%d %H:%M UTC'))"
            git push
          fi
